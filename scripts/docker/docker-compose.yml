version: "3.9"

# metiq daemon + optional Playwright browser sandbox
#
# Quick start:
#   cp .env.example .env   # fill in METIQ_NOSTR_KEY + API keys
#   docker compose up -d
#
# To enable browser control, uncomment the `playwright` service and
# set METIQ_BROWSER_URL=http://playwright:3500 in .env.

services:

  # ── metiq daemon ──────────────────────────────────────────────────────────
  metiqd:
    build:
      context: ../..          # repo root
      dockerfile: scripts/docker/Dockerfile
    image: metiq/metiqd:latest
    restart: unless-stopped
    env_file:
      - .env                  # create from .env.example
    volumes:
      - metiq-data:/data   # persistent config + session storage
    depends_on:
      playwright:
        condition: service_healthy
        required: false       # still starts if playwright is disabled
    networks:
      - metiq

  # ── Playwright browser sandbox (optional, high-value) ────────────────────────
  # Set METIQ_BROWSER_URL=http://playwright:3500 in .env to enable.
  playwright:
    image: metiq/playwright-sandbox:latest
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile.playwright
    restart: unless-stopped
    environment:
      - SANDBOX_LISTEN=0.0.0.0:3500
      - SANDBOX_AUTH_TOKEN=${METIQ_BROWSER_TOKEN:-}
      - EVALUATE_ENABLED=1
      - NOVNC_ENABLED=0
    ports:
      - "127.0.0.1:3500:3500"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3500/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - metiq
    profiles:
      - browser  # opt-in: docker compose --profile browser up

volumes:
  metiq-data:

networks:
  metiq:
    driver: bridge
