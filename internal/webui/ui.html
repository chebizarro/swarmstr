<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metiq</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Cyberwave Theme - Electric Purple, Neon Blue, Cyberpunk Aesthetic */
  --bg: #0a0a0f;
  --surface: #16161d;
  --border: #2a2a38;
  --accent: #B026FF;        /* Bright electric purple */
  --accent-bright: #D580FF; /* Lighter neon purple */
  --accent-dim: #7A1CAC;    /* Deep dark purple */
  --accent-hover: #C850FF;
  --accent-glow: rgba(176, 38, 255, 0.3);
  --text: #e8e8f5;
  --text-muted: #9D9DAF;    /* Muted purple-gray */
  --user-bubble: #1f1835;
  --user-border: #3d2a5f;
  --agent-bubble: #151a28;
  --agent-border: #2a3048;
  --error: #FF006E;         /* Hot neon pink */
  --success: #39FF14;       /* Neon green */
  --warn: #FFD700;          /* Electric gold */
  --info: #00D4FF;          /* Electric cyan */
  --font: ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: ui-monospace, SFMono-Regular, monospace;
}
body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(176, 38, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
  color: var(--text);
  font-family: var(--font);
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
header {
  padding: 0.6rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--accent-dim);
  box-shadow: 0 2px 12px rgba(176, 38, 255, 0.1);
  display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0;
}
header h1 {
  font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--accent-bright), var(--info));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-muted); flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.connected {
  background: var(--success);
  box-shadow: 0 0 8px var(--success), 0 0 4px var(--success);
}
.status-dot.error {
  background: var(--error);
  box-shadow: 0 0 8px var(--error), 0 0 4px var(--error);
}
.header-info { color: var(--text-muted); font-size: 0.72rem; margin-left: auto; display: flex; gap: 0.75rem; align-items: center; }
.badge {
  background: rgba(122, 28, 172, 0.15);
  border: 1px solid var(--accent-dim);
  border-radius: 9999px; padding: 0.1rem 0.55rem; font-size: 0.68rem; font-family: var(--mono);
  color: var(--accent-bright);
}
.badge.warn {
  color: var(--warn);
  border-color: var(--warn);
  background: rgba(255, 215, 0, 0.1);
  box-shadow: 0 0 6px rgba(255, 215, 0, 0.2);
}

/* ── Layout ── */
.layout { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--accent-dim);
  box-shadow: 2px 0 12px rgba(176, 38, 255, 0.1);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 0.55rem 0.4rem; font-size: 0.7rem; font-weight: 600;
  color: var(--text-muted); background: none; border: none; cursor: pointer;
  letter-spacing: 0.04em; transition: color 0.15s, border-bottom 0.15s, text-shadow 0.15s;
  border-bottom: 2px solid transparent;
}
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  text-shadow: 0 0 8px var(--accent-glow);
}
.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 0.5rem 0; }
.tab-panel.active { display: block; }
.sidebar-item {
  padding: 0.45rem 0.85rem; font-size: 0.75rem; cursor: pointer;
  border-left: 2px solid transparent; color: var(--text-muted);
  transition: background 0.1s, color 0.1s, border-left-color 0.1s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-item:hover {
  background: rgba(176, 38, 255, 0.08);
  color: var(--text);
}
.sidebar-item.active {
  color: var(--accent-bright);
  border-left-color: var(--accent);
  background: rgba(176, 38, 255, 0.12);
  box-shadow: inset 2px 0 8px rgba(176, 38, 255, 0.2);
}
.sidebar-item .sub { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-section { padding: 0.65rem 0.85rem 0.25rem; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.sidebar-empty { padding: 0.75rem 0.85rem; font-size: 0.72rem; color: var(--text-muted); font-style: italic; }
.new-session-btn {
  margin: 0.5rem 0.75rem; padding: 0.4rem 0.75rem; background: none;
  border: 1px solid var(--border); border-radius: 0.4rem; color: var(--text-muted);
  font-size: 0.72rem; cursor: pointer; width: calc(100% - 1.5rem); text-align: left;
  transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
}
.new-session-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(176, 38, 255, 0.2);
}
.channel-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--success);
  display: inline-block; margin-right: 0.4rem; flex-shrink: 0;
  box-shadow: 0 0 6px var(--success), 0 0 3px var(--success);
}

/* ── Main conversation ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages {
  flex: 1; overflow-y: auto; padding: 1rem 0;
  display: flex; flex-direction: column; gap: 0.5rem; scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: rgba(176, 38, 255, 0.03); }
#messages::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent-dim), var(--accent));
  border-radius: 9999px;
  box-shadow: 0 0 6px rgba(176, 38, 255, 0.4);
}
#messages::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent), var(--accent-bright));
}
.msg {
  max-width: min(72ch, 90%); padding: 0.65rem 0.9rem;
  border-radius: 0.75rem; line-height: 1.55; font-size: 0.875rem;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user  {
  align-self: flex-end;
  background: var(--user-bubble);
  border: 1px solid var(--user-border);
  margin-right: 1.25rem;
  box-shadow: 0 2px 8px rgba(176, 38, 255, 0.15);
}
.msg.agent {
  align-self: flex-start;
  background: var(--agent-bubble);
  border: 1px solid var(--agent-border);
  margin-left: 1.25rem;
  box-shadow: 0 2px 8px rgba(0, 212, 255, 0.08);
}
.msg.system {
  align-self: center;
  color: var(--text-muted);
  font-size: 0.72rem;
  background: none;
  border: none;
  max-width: 100%;
}
.msg.error-msg {
  align-self: center;
  color: var(--error);
  font-size: 0.8rem;
  background: none;
  border: none;
  text-shadow: 0 0 8px rgba(255, 0, 110, 0.4);
}
.msg.streaming { opacity: 0.9; }
.msg.streaming::after {
  content: '▌';
  opacity: 0.7;
  color: var(--accent-bright);
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:0.7} 50%{opacity:0} }

.thinking { display: flex; gap: 4px; align-items: center; padding: 0.65rem 0.9rem; margin-left: 1.25rem; }
.thinking span {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.2s infinite ease-in-out;
  box-shadow: 0 0 6px var(--accent-glow);
}
.thinking span:nth-child(2) { animation-delay: 0.15s; }
.thinking span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%,80%,100%{transform:scale(0.6);opacity:0.4;box-shadow:0 0 2px var(--accent-glow)}
  40%{transform:scale(1);opacity:1;box-shadow:0 0 10px var(--accent-glow)}
}

/* ── Input area ── */
footer {
  padding: 0.75rem 1.25rem;
  background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
}
.input-row { display: flex; gap: 0.5rem; }
#input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 0.5rem; padding: 0.6rem 0.85rem; color: var(--text);
  font-family: var(--font); font-size: 0.875rem; outline: none;
  resize: none; min-height: 2.5rem; max-height: 8rem; overflow-y: auto;
  field-sizing: content; transition: border-color 0.2s, box-shadow 0.2s;
}
#input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(176, 38, 255, 0.2), inset 0 0 20px rgba(176, 38, 255, 0.05);
}
#input::placeholder { color: var(--text-muted); }
#send {
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  border: none; border-radius: 0.5rem;
  padding: 0.6rem 1rem; color: #fff; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  box-shadow: 0 2px 12px rgba(176, 38, 255, 0.3);
}
#send:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--accent-hover), var(--accent));
  box-shadow: 0 4px 20px rgba(176, 38, 255, 0.5);
  transform: translateY(-1px);
}
#send:active:not(:disabled) {
  transform: translateY(0);
}
#send:disabled { opacity: 0.4; cursor: not-allowed; }
.hint {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 0.35rem;
  font-style: italic;
}

/* ── Approval modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(2px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  border-radius: 0.85rem; padding: 1.5rem; max-width: 480px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 40px rgba(176, 38, 255, 0.2);
}
.modal h2 {
  font-size: 1rem; margin-bottom: 0.5rem;
  color: var(--warn);
  text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
}
.modal .cmd-box {
  background: var(--bg);
  border: 1px solid var(--accent-dim);
  border-radius: 0.5rem;
  padding: 0.6rem 0.85rem; font-family: var(--mono); font-size: 0.8rem;
  white-space: pre-wrap; word-break: break-all; margin: 0.75rem 0 1rem;
  max-height: 160px; overflow-y: auto;
  color: var(--warn);
  box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.05);
}
.modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
.btn {
  padding: 0.5rem 1.2rem; border-radius: 0.4rem;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  border: none;
  transition: box-shadow 0.2s, transform 0.1s;
}
.btn-deny  {
  background: rgba(255, 0, 110, 0.15);
  color: var(--error);
  border: 1px solid var(--error);
  box-shadow: 0 0 8px rgba(255, 0, 110, 0.2);
}
.btn-approve {
  background: rgba(57, 255, 20, 0.15);
  color: var(--success);
  border: 1px solid var(--success);
  box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
}
.btn:hover {
  filter: brightness(1.2);
  transform: translateY(-1px);
  box-shadow: 0 2px 12px currentColor;
}
.btn:active {
  transform: translateY(0);
}
</style>
</head>
<body>
<header>
  <div class="status-dot" id="dot"></div>
  <h1>Metiq</h1>
  <div class="header-info">
    <span class="badge" id="agent-badge">agent: main</span>
    <span class="badge warn" id="approvals-badge" style="display:none">⚠ approval pending</span>
    <span id="conn-label">connecting…</span>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="sessions">Sessions</button>
      <button class="tab-btn" data-tab="channels">Channels</button>
      <button class="tab-btn" data-tab="agents">Agents</button>
    </div>
    <div class="tab-panel active" id="tab-sessions">
      <button class="new-session-btn" id="new-session-btn">+ New session</button>
      <div id="sessions-list"><div class="sidebar-empty">Loading…</div></div>
    </div>
    <div class="tab-panel" id="tab-channels">
      <div id="channels-list"><div class="sidebar-empty">Loading…</div></div>
    </div>
    <div class="tab-panel" id="tab-agents">
      <div id="agents-list"><div class="sidebar-empty">Loading…</div></div>
    </div>
  </aside>

  <!-- Main conversation -->
  <div class="main">
    <div id="messages"></div>
    <footer>
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Send a message… (Shift+Enter for newline)" disabled></textarea>
        <button id="send" disabled>Send</button>
      </div>
      <p class="hint">Tip: /help for slash commands</p>
    </footer>
  </div>
</div>

<!-- Exec approval modal -->
<div class="modal-overlay" id="approval-modal">
  <div class="modal">
    <h2>⚠ Exec Approval Required</h2>
    <p style="font-size:0.82rem;color:var(--text-muted)">The agent wants to run the following command. Approve or deny:</p>
    <div class="cmd-box" id="approval-cmd"></div>
    <div class="modal-actions">
      <button class="btn btn-deny"    id="approval-deny">Deny</button>
      <button class="btn btn-approve" id="approval-approve">Approve</button>
    </div>
  </div>
</div>

<script>
const WS_PATH = '{{.WSPath}}';
const TOKEN   = '{{.Token}}';
(function () {
  const $ = id => document.getElementById(id);

  const msgs      = $('messages');
  const input     = $('input');
  const sendBtn   = $('send');
  const dot       = $('dot');
  const connLabel = $('conn-label');
  const agentBadge      = $('agent-badge');
  const approvalsBadge  = $('approvals-badge');
  const approvalModal   = $('approval-modal');
  const approvalCmd     = $('approval-cmd');
  const sessionsList    = $('sessions-list');
  const channelsList    = $('channels-list');
  const agentsList      = $('agents-list');

  // ── State ─────────────────────────────────────────────────────────────────
  let ws, reconnectDelay = 1500;
  let connected = false;
  let pendingResolvers = {};
  let seq = 0;
  let sessionID = localStorage.getItem('metiq_session') || null;
  let activeAgentID = 'main';
  // Streaming: the current agent bubble being written to (or null).
  let streamingBubble = null;
  let thinkingEl = null;
  // Approval queue: id → {id, command, resolve}
  let approvalQueue = [];
  let currentApprovalID = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function nextID() { return 'ui-' + (++seq); }

  function addMsg(text, role) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function showThinking() {
    hideThinking();
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'msg agent thinking';
    thinkingEl.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(thinkingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function setConnected(ok, label) {
    dot.className = 'status-dot' + (ok ? ' connected' : ok === false ? ' error' : '');
    connLabel.textContent = label;
    input.disabled = !ok;
    sendBtn.disabled = !ok;
    if (ok) input.focus();
  }

  // ── Streaming bubble management ───────────────────────────────────────────
  function startStreaming() {
    hideThinking();
    streamingBubble = document.createElement('div');
    streamingBubble.className = 'msg agent streaming';
    streamingBubble.textContent = '';
    msgs.appendChild(streamingBubble);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendChunk(text) {
    if (!streamingBubble) startStreaming();
    streamingBubble.textContent += text;
    msgs.scrollTop = msgs.scrollHeight;
  }

  function finalizeStreaming() {
    if (streamingBubble) {
      streamingBubble.classList.remove('streaming');
      // Keep bubble as a normal agent message.
      if (!streamingBubble.textContent.trim()) {
        streamingBubble.remove();
      }
      streamingBubble = null;
    }
    hideThinking();
  }

  // ── Gateway WS protocol ───────────────────────────────────────────────────
  function sendFrame(frame) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(frame));
  }

  function callMethod(method, params) {
    return new Promise((resolve, reject) => {
      const id = nextID();
      pendingResolvers[id] = { resolve, reject };
      sendFrame({ type: 'request', id, method, params: params || {} });
    });
  }

  async function loadSidebar() {
    // Load sessions, channels, agents in parallel.
    await Promise.all([loadSessions(), loadChannels(), loadAgents()]);
  }

  async function loadSessions() {
    try {
      const res = await callMethod('sessions.list', { limit: 40 });
      const sessions = res && (res.sessions || res.items || []);
      if (!sessions || !sessions.length) {
        sessionsList.innerHTML = '<div class="sidebar-empty">No sessions yet</div>';
        return;
      }
      sessionsList.innerHTML = '';
      sessions.forEach(s => {
        const el = document.createElement('div');
        el.className = 'sidebar-item' + (s.session_id === sessionID ? ' active' : '');
        el.dataset.sid = s.session_id;
        el.innerHTML = `<div>${truncate(s.session_id, 22)}</div><div class="sub">${s.preview || ''}</div>`;
        el.addEventListener('click', () => switchSession(s.session_id));
        sessionsList.appendChild(el);
      });
    } catch { sessionsList.innerHTML = '<div class="sidebar-empty">—</div>'; }
  }

  async function loadChannels() {
    try {
      const res = await callMethod('channels.list', {});
      const chans = res && (res.channels || res.items || []);
      if (!chans || !chans.length) {
        channelsList.innerHTML = '<div class="sidebar-empty">No channels connected</div>';
        return;
      }
      channelsList.innerHTML = '';
      chans.forEach(c => {
        const el = document.createElement('div');
        el.className = 'sidebar-item';
        el.innerHTML = `<span class="channel-dot"></span>${c.id || '—'}<div class="sub">${c.type || ''}</div>`;
        channelsList.appendChild(el);
      });
    } catch { channelsList.innerHTML = '<div class="sidebar-empty">—</div>'; }
  }

  async function loadAgents() {
    try {
      const res = await callMethod('agents.list', {});
      const ags = res && (res.agents || res.items || []);
      if (!ags || !ags.length) {
        agentsList.innerHTML = '<div class="sidebar-empty">No agents configured</div>';
        return;
      }
      agentsList.innerHTML = '';
      ags.forEach(a => {
        const el = document.createElement('div');
        el.className = 'sidebar-item' + (a.id === activeAgentID ? ' active' : '');
        el.innerHTML = `<div>${a.id || a.agent_id}</div><div class="sub">${a.model || ''}</div>`;
        agentsList.appendChild(el);
      });
    } catch { agentsList.innerHTML = '<div class="sidebar-empty">—</div>'; }
  }

  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

  function switchSession(sid) {
    sessionID = sid;
    localStorage.setItem('metiq_session', sid);
    msgs.innerHTML = '';
    addMsg('Switched to session: ' + sid, 'system');
    // Update active state in sidebar.
    document.querySelectorAll('#sessions-list .sidebar-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sid === sid);
    });
  }

  // ── Approval queue management ─────────────────────────────────────────────
  function enqueueApproval(id, command) {
    approvalQueue.push({ id, command });
    approvalsBadge.style.display = '';
    if (!currentApprovalID) showNextApproval();
  }

  function showNextApproval() {
    if (!approvalQueue.length) {
      currentApprovalID = null;
      approvalModal.classList.remove('visible');
      approvalsBadge.style.display = 'none';
      return;
    }
    const a = approvalQueue[0];
    currentApprovalID = a.id;
    approvalCmd.textContent = a.command || a.id;
    approvalModal.classList.add('visible');
  }

  async function resolveApproval(decision) {
    if (!currentApprovalID) return;
    const id = currentApprovalID;
    approvalQueue = approvalQueue.filter(a => a.id !== id);
    currentApprovalID = null;
    approvalModal.classList.remove('visible');
    try {
      await callMethod('exec.approval.resolve', { id, decision });
    } catch (e) {
      addMsg('⚠️ Could not resolve approval: ' + (e && e.message), 'error-msg');
    }
    showNextApproval();
  }

  $('approval-approve').addEventListener('click', () => resolveApproval('approve'));
  $('approval-deny').addEventListener('click',    () => resolveApproval('deny'));

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      $('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  $('new-session-btn').addEventListener('click', () => {
    sessionID = null;
    localStorage.removeItem('metiq_session');
    msgs.innerHTML = '';
    addMsg('New conversation started.', 'system');
    document.querySelectorAll('#sessions-list .sidebar-item').forEach(el => el.classList.remove('active'));
    input.focus();
  });

  // ── WS event dispatcher ───────────────────────────────────────────────────
  function onEvent(event, payload) {
    switch (event) {
      case 'agent.status':
        if (payload) {
          activeAgentID = payload.agent_id || activeAgentID;
          agentBadge.textContent = 'agent: ' + activeAgentID;
          if (payload.status === 'thinking' && payload.session_id === sessionID) {
            if (!streamingBubble) showThinking();
          }
          if (payload.status === 'idle') {
            if (!streamingBubble) hideThinking();
          }
        }
        break;
      case 'chat.chunk':
        if (payload && payload.session_id === sessionID) {
          if (payload.done) {
            finalizeStreaming();
            loadSessions(); // Refresh session list after reply.
          } else if (payload.text) {
            appendChunk(payload.text);
          }
        }
        break;
      case 'chat.message':
        if (payload && payload.direction === 'outbound' && !streamingBubble) {
          hideThinking();
          if (payload.text) addMsg(payload.text, 'agent');
        }
        break;
      case 'exec.approval.requested':
        if (payload) enqueueApproval(payload.id, payload.command);
        break;
      case 'config.updated':
        addMsg('Config reloaded.', 'system');
        loadAgents();
        break;
      case 'channel.message':
        // Optionally surface channel messages in a notification.
        break;
    }
  }

  // ── WebSocket connect ─────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + WS_PATH);
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => {};
    ws.onmessage = async (ev) => {
      let frame;
      try { frame = JSON.parse(ev.data); } catch { return; }

      if (frame.type === 'event') {
        if (frame.event === 'connect.challenge') {
          const nonce = frame.payload && frame.payload.nonce;
          const id = nextID();
          sendFrame({
            type: 'request', id, method: 'connect',
            params: {
              client: { id: 'metiq-webui', mode: 'local', platform: navigator.platform || 'browser', version: '0.0.0', instanceId: 'webui-' + Math.random().toString(36).slice(2) },
              min_protocol: 1, max_protocol: 10,
              auth: { token: TOKEN, nonce }
            }
          });
          pendingResolvers[id] = {
            resolve: () => {
              connected = true;
              reconnectDelay = 1500;
              setConnected(true, 'connected');
              addMsg('Connected. Type /help for commands.', 'system');
              loadSidebar();
            },
            reject: (err) => {
              setConnected(false, 'auth failed');
              addMsg('Connection refused: ' + (err && err.message || 'authentication required'), 'error-msg');
            }
          };
          return;
        }
        onEvent(frame.event, frame.payload);
        return;
      }

      if (frame.type === 'response' && frame.id) {
        const resolver = pendingResolvers[frame.id];
        delete pendingResolvers[frame.id];
        if (resolver) {
          if (frame.ok) resolver.resolve(frame.payload);
          else resolver.reject(frame.error || { message: 'request failed' });
        }
      }
    };

    ws.onerror = () => setConnected(null, 'connection error');
    ws.onclose = () => {
      connected = false;
      finalizeStreaming();
      setConnected(null, 'reconnecting in ' + (reconnectDelay / 1000).toFixed(1) + 's…');
      pendingResolvers = {};
      hideThinking();
      setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
        connect();
      }, reconnectDelay);
    };
  }

  // ── Sending messages ──────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || !connected) return;
    input.value = '';
    input.style.height = '';
    addMsg(text, 'user');
    sendBtn.disabled = true;

    // Show thinking indicator; streaming chunks will replace it.
    showThinking();

    try {
      const result = await callMethod('chat.send', { message: text, session_id: sessionID || undefined });
      if (result && result.session_id && result.session_id !== sessionID) {
        sessionID = result.session_id;
        localStorage.setItem('metiq_session', sessionID);
      }
      // If no streaming chunks arrived, render the final response from result.text.
      if (!streamingBubble && result && result.text) {
        hideThinking();
        addMsg(result.text, 'agent');
        loadSessions();
      }
    } catch (err) {
      finalizeStreaming();
      hideThinking();
      addMsg('⚠️ ' + (err && err.message ? err.message : 'Request failed'), 'error-msg');
    } finally {
      sendBtn.disabled = !connected;
      input.focus();
    }
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  setConnected(null, 'connecting…');
  connect();
})();
</script>
</body>
</html>
